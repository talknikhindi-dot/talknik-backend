<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Talknik VIP | Total Control System</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* ????? ???? */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: #111; padding: 40px; border-radius: 15px; border: 2px solid #00ffcc; text-align: center; box-shadow: 0 0 30px #00ffcc; }
        
        /* ???????? ???? */
        #dashboard { display: none; padding: 20px; flex-grow: 1; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #444; }
        
        /* ?????? ????????? */
        h1, h2 { text-transform: uppercase; letter-spacing: 2px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #00ffcc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00ffcc; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { box-shadow: 0 0 20px #00ffcc; transform: scale(1.02); }
        #preview-box { background: white; min-height: 300px; border-radius: 5px; color: black; padding: 10px; overflow: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>Talknik Admin</h1>
            <input type="text" id="user" placeholder="USERNAME">
            <input type="password" id="pass" placeholder="PASSWORD">
            <button onclick="login()">Unlock Engine ??</button>
        </div>
    </div>

    <div id="dashboard">
        <header style="border-bottom: 2px solid #00ffcc; padding-bottom: 10px;">
            <h1>TALKNIK MASTER CONTROL ?</h1>
            <p>Admin: Sumit Chougule | Status: <span id="db-status" style="color: yellow;">Checking Database...</span></p>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Ad Control Center</h2>
                <textarea id="adInput" placeholder="Paste Adsterra/Monetag code here..."></textarea>
                <button onclick="pushUpdate()">Update All 28 Sites ?</button>
            </div>

            <div class="card">
                <h2>Live Preview</h2>
                <div id="preview-box">
                    <p style="color: #999; text-align: center; padding-top: 120px;">Waiting for update...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ????? ?????
        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === 'talknik_admin' && p === 'Admin12345') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                checkConnection();
            } else {
                alert('Access Denied!');
            }
        }

        // ??????? ??????? ???
        async function checkConnection() {
            try {
                const res = await fetch('https://talknik-backend.onrender.com/');
                if(res.ok) document.getElementById('db-status').innerText = "? DATABASE CONNECTED";
            } catch(e) { document.getElementById('db-status').innerText = "? SERVER ERROR"; }
        }

        // ????? ?????
        async function pushUpdate() {
            const code = document.getElementById('adInput').value;
            const preview = document.getElementById('preview-box');
            
            try {
                const res = await fetch('https://talknik-backend.onrender.com/update-ads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ network: "Active", code: code })
                });
                if(res.ok) {
                    alert('Success! All sites updated.');
                    preview.innerHTML = code;
                }
            } catch(e) { alert('Push Failed!'); }
        }
    </script>
</body>
</html>
