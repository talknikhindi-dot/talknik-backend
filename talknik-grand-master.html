<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Talknik VIP | Total Control Center</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ?. ????? ??????? (Security Layer) */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; border: 5px solid #00ffcc; box-sizing: border-box; }
        .login-box { background: #111; padding: 50px; border: 2px solid #00ffcc; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(0,255,204,0.3); }
        .login-box h1 { margin-bottom: 30px; letter-spacing: 5px; text-shadow: 0 0 10px #00ffcc; }
        input { background: #000; border: 1px solid #00ffcc; color: #00ffcc; padding: 15px; width: 250px; margin-bottom: 15px; border-radius: 5px; outline: none; text-align: center; }
        
        /* ?. ????? ???? (Admin Panel) */
        #admin-panel { display: none; padding: 30px; flex-grow: 1; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00ffcc; padding-bottom: 15px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h2 { border-left: 5px solid #00ffcc; padding-left: 15px; text-transform: uppercase; font-size: 18px; margin-top: 0; }
        
        /* ?. ??????? ??????? ??? ?????????? */
        textarea { width: 100%; height: 250px; background: #000; color: #00ffcc; border: 1px solid #444; padding: 15px; border-radius: 10px; font-family: 'Courier New', monospace; box-sizing: border-box; }
        button { background: #00ffcc; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 25px #00ffcc; }
        #live-box { background: white; min-height: 250px; border-radius: 10px; margin-top: 15px; padding: 20px; overflow: auto; color: black; border: 8px solid #222; }
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1>TALKNIK ADMIN</h1>
            <input type="text" id="username" placeholder="USERNAME"><br>
            <input type="password" id="password" placeholder="PASSWORD"><br>
            <button onclick="unlockEngine()">UNLEASH ENGINE ??</button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="top-bar">
            <h1>MASTER ENGINE STATUS: <span id="online-text" style="color: yellow;">CHECKING...</span></h1>
            <div>Admin: <strong>Sumit Chougule</strong></div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>1. Global Ad Control Center</h2>
                <p>Paste Ad Code (Adsterra/Monetag) to update all sites:</p>
                <textarea id="adCodeArea" placeholder="<script>...</script>"></textarea>
                <button onclick="syncToDatabase()">PUSH TO ALL 28 SITES ?</button>
                <p id="sync-status" style="margin-top: 10px; font-size: 14px;"></p>
            </div>

            <div class="card">
                <h2>2. Real-Time Ad Preview</h2>
                <p>This is how your ads look live on the frontend:</p>
                <div id="live-box">
                    <p style="text-align: center; color: #888; padding-top: 100px;">Waiting for Code Push...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ?. ????? ?????? ?????
        function unlockEngine() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            // ????? ?????????????
            if(u === 'talknik_admin' && p === 'Admin12345') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                checkBackend();
            } else {
                alert('Invalid Credentials! Access Denied.');
            }
        }

        // ?. ?????? ????????????? ???
        async function checkBackend() {
            const statusText = document.getElementById('online-text');
            try {
                const res = await fetch('https://talknik-backend.onrender.com/');
                if(res.ok) {
                    statusText.innerText = "? ONLINE & CONNECTED";
                    statusText.style.color = "#00ffcc";
                }
            } catch(e) {
                statusText.innerText = "? BACKEND OFFLINE";
                statusText.style.color = "red";
            }
        }

        // ?. ?????? ??????? ????
        async function syncToDatabase() {
            const code = document.getElementById('adCodeArea').value;
            const status = document.getElementById('sync-status');
            const preview = document.getElementById('live-box');

            if(!code) return alert('Please enter ad code first!');
            status.innerText = "? Syncing with Render Database...";
            status.style.color = "yellow";

            try {
                const res = await fetch('https://talknik-backend.onrender.com/update-ads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ network: "Active_Master", code: code })
                });

                const data = await res.json();
                if(data.success || data.message === 'Updated Successfully') {
                    status.innerText = "?? SUCCESS! LIVE ON ALL 28 SITES.";
                    status.style.color = "lime";
                    preview.innerHTML = code;
                    
                    // Scripts Execution Logic
                    const scripts = preview.getElementsByTagName('script');
                    for (let s of scripts) {
                        const ns = document.createElement('script');
                        if (s.src) ns.src = s.src;
                        ns.textContent = s.textContent;
                        s.parentNode.replaceChild(ns, s);
                    }
                }
            } catch (e) {
                status.innerText = "? FAILED: Check Connection.";
                status.style.color = "red";
            }
        }
    </script>
</body>
</html>
