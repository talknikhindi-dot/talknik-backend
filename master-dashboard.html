<!DOCTYPE html>
<html>
<head>
    <title>Talknik Control</title>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 50px; }
        textarea { width: 80%; height: 200px; background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; }
        button { background: #0f0; color: #000; padding: 15px 30px; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>TALKNIK MASTER CONTROL</h1>
    <textarea id="code" placeholder="Paste Ad Code Here"></textarea><br>
    <button onclick="update()">UPDATE SITES ?</button>
    <p id="msg"></p>
    <script>
        async function update() {
            const code = document.getElementById('code').value;
            document.getElementById('msg').innerText = "Updating...";
            try {
                const res = await fetch('https://talknik-backend.onrender.com/update-ads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ network: "Active", code: code })
                });
                if(res.ok) document.getElementById('msg').innerText = "? DONE!";
            } catch(e) { document.getElementById('msg').innerText = "? FAILED"; }
        }
    </script>
</body>
</html>
