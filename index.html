<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talknik Studio | Cloud Engine</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>
    <style>
        :root { --blog: #6610f2; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* ???? ????? */
        #home-view { text-align: center; }
        .plus-btn-center { width: 90px; height: 90px; background: linear-gradient(45deg, #FF3366, #6610f2); color: white; border: none; border-radius: 30px; font-size: 55px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.1); font-weight: bold; }

        /* ??????????? ???? */
        #menu-view { display: none; width: 90%; max-width: 400px; padding: 20px; }
        .main-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .menu-opt { padding: 15px; cursor: pointer; border-radius: 12px; font-weight: 800; border-left: 5px solid #eee; font-size: 11px; text-transform: uppercase; text-align: center; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .menu-opt:hover { background: #f0f0f0; }

        /* ?????? ????? */
        .master-container { display: none; width: 95%; max-width: 900px; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin: 10px; box-sizing: border-box; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-link { padding: 10px 15px; cursor: pointer; border: none; background: #eee; border-radius: 8px; font-weight: bold; font-size: 12px; flex: 1; }
        .tab-link.active { background: var(--blog); color: white; }

        .editor-area { width: 100%; min-height: 300px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; }
        #html-editor { font-family: monospace; background: #1e1e1e; color: #fff; }
        
        .publish-btn { width: 100%; padding: 18px; background: #000; color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 900; cursor: pointer; margin-top: 15px; letter-spacing: 1px; }
        .back-home-btn { position: fixed; bottom: 15px; right: 15px; width: 55px; height: 55px; background: #222; color: white; border: none; border-radius: 50%; font-size: 24px; cursor: pointer; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="home-view"><button class="plus-btn-center" onclick="showMenu()">+</button></div>

    <div id="menu-view">
        <div class="main-menu">
            <div class="menu-opt" style="border-left-color:#007bff" onclick="openEditor('Normal Post')">Post</div>
            <div class="menu-opt" style="border-left-color:#FF3366" onclick="openEditor('Video Post')">Video</div>
            <div class="menu-opt" style="border-left-color:#28a745" onclick="openEditor('Photo Post')">Photo</div>
            <div class="menu-opt" style="border-left-color:#6610f2" onclick="openEditor('Blog Post')">Blog</div>
            <div class="menu-opt" style="border-left-color:#fd7e14" onclick="openEditor('Shorts')">Shorts</div>
            <div class="menu-opt" style="border-left-color:#3f51b5" onclick="openEditor('Music')">Music</div>
        </div>
    </div>

    <div id="editor-view" class="master-container">
        <h1 id="main-form-title" style="text-align:center; font-size:1.2rem;">BLOG POST</h1>
        <input type="text" id="post-title" placeholder="TITLE" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;" oninput="sync()">
        <textarea id="post-desc" rows="2" placeholder="DESCRIPTION" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;" oninput="sync()"></textarea>

        <div class="tabs">
            <button class="tab-link active" onclick="showTab(event, 'content-tab')">CONTENT</button>
            <button class="tab-link" onclick="showTab(event, 'html-tab')">HTML</button>
            <button class="tab-link" onclick="showTab(event, 'preview-tab')">PREVIEW</button>
        </div>

        <div id="content-tab" class="view-tab active" style="display:block;"><div id="rich-editor" class="editor-area" contenteditable="true" oninput="syncRich()">Start...</div></div>
        <div id="html-tab" class="view-tab" style="display:none;"><textarea id="html-editor" class="editor-area" oninput="syncHTML()"></textarea></div>
        <div id="preview-tab" class="view-tab" style="display:none;"><div id="live-preview" style="border:1px solid #ddd; padding:15px; min-height:300px; border-radius:10px;"><h2 id="view-title"></h2><p id="view-desc"></p><hr><div id="view-body"></div></div></div>

        <input type="file" id="file-input" style="margin-top:15px;">
        <button class="publish-btn" onclick="publishPost()">PUBLISH</button>
    </div>

    <button id="back-home" class="back-home-btn" onclick="goBackToPlus()">+</button>

    <script>
        // Firebase Config (???? ????? ??????? Firebase Credentials ????)
        const firebaseConfig = { apiKey: "YOUR_API_KEY", databaseURL: "YOUR_DB_URL", storageBucket: "YOUR_STORAGE" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showMenu() { document.getElementById('home-view').style.display='none'; document.getElementById('menu-view').style.display='block'; }
        function openEditor(t) { document.getElementById('menu-view').style.display='none'; document.getElementById('editor-view').style.display='block'; document.getElementById('back-home').style.display='block'; document.getElementById('main-form-title').innerText=t.toUpperCase(); }
        function goBackToPlus() { location.reload(); }
        function showTab(e, n) { document.querySelectorAll('.view-tab').forEach(x=>x.style.display='none'); document.querySelectorAll('.tab-link').forEach(x=>x.classList.remove('active')); document.getElementById(n).style.display='block'; e.currentTarget.classList.add('active'); }
        function syncRich() { document.getElementById('html-editor').value=document.getElementById('rich-editor').innerHTML; sync(); }
        function syncHTML() { document.getElementById('rich-editor').innerHTML=document.getElementById('html-editor').value; sync(); }
        function sync() { document.getElementById('view-title').innerText=document.getElementById('post-title').value; document.getElementById('view-desc').innerText=document.getElementById('post-desc').value; document.getElementById('view-body').innerHTML=document.getElementById('rich-editor').innerHTML; }

        function publishPost() {
            const data = { title: document.getElementById('post-title').value, body: document.getElementById('rich-editor').innerHTML, date: new Date().toISOString() };
            db.ref('posts/').push(data).then(() => alert('PUBLISHED TO CLOUD!'));
        }
    </script>
</body>
</html>
