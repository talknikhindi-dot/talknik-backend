<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Talknik IT - Global VIP Tool</title>
    <style>
        :root { --neon: #00f2ff; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .vip-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.3); padding: 50px; border-radius: 30px; text-align: center; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); width: 85%; max-width: 450px; border-top: 4px solid var(--neon); }
        h1 { font-size: 2.8em; letter-spacing: 8px; color: var(--neon); text-shadow: 0 0 20px var(--neon); margin: 0; font-weight: 900; }
        .loader-box { height: 6px; background: #1a1a1a; border-radius: 3px; margin: 30px 0; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: var(--neon); width: 0%; box-shadow: 0 0 15px var(--neon); transition: width 0.5s ease; }
        #status-msg { font-family: 'Courier New', monospace; color: var(--neon); font-size: 0.9em; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class='vip-card'>
        <h1>TALKNIK</h1>
        <p style='opacity: 0.5; font-size: 0.8em;'>SECURE CLOUD PROTOCOL v4.0</p>
        <div class='loader-box'><div id='bar' class='progress-fill'></div></div>
        <div id='status-msg'>INITIALIZING...</div>
    </div>

    <script>
        async function launchTalknikVIP() {
            const bar = document.getElementById('bar');
            const status = document.getElementById('status-msg');
            try {
                // ??????? Render ??????????? ?????????? ???? ??????
                const res = await fetch('https://talknik-backend.onrender.com/ads');
                const ads = await res.json();
                if(ads.length > 0) {
                    const activeAd = ads[ads.length - 1];
                    let duration = (activeAd.timer || 20000); // ?? ????? ?????
                    let elapsed = 0;
                    
                    const clock = setInterval(() => {
                        elapsed += 500;
                        let percent = (elapsed / duration) * 100;
                        bar.style.width = percent + '%';
                        status.innerText = 'REDIRECTING IN ' + Math.ceil((duration - elapsed)/1000) + 'S';

                        if(elapsed >= duration) {
                            clearInterval(clock);
                            window.location.href = activeAd.url; // Monetag ?????? ????
                        }
                    }, 500);
                }
            } catch (err) {
                status.innerText = 'CONNECTION ERROR - RETRYING';
            }
        }
        launchTalknikVIP();
    </script>
</body>
</html>
