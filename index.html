<!DOCTYPE html>
<html>
<head>
    <title>Talknik IT - Secure Tool</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .system-box { border: 1px solid #00ffcc; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px #00ffcc; text-align: center; }
        .glitch { font-size: 24px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class='system-box'>
        <div class='glitch'>Talknik IT System Active</div>
        <p id='status'>Fetching Secure Link...</p>
    </div>
    <script>
        async function initTalknik() {
            try {
                const response = await fetch('https://talknik-backend.onrender.com/ads');
                const data = await response.json();
                if(data.length > 0) {
                    const latest = data[data.length - 1];
                    document.getElementById('status').innerText = 'Connected: ' + latest.title;
                    // ?????????? ??????? ?????????? (?? ?????) ?????????? ????
                    setTimeout(() => { window.location.href = latest.url; }, latest.timer || 20000);
                }
            } catch (e) { document.getElementById('status').innerText = 'Server Sleep - Retrying...'; }
        }
        initTalknik();
    </script>
</body>
</html>
