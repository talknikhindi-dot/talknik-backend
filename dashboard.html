<!DOCTYPE html>
<html>
<head><title>Talknik Ad-Control</title></head>
<body style="background:#000; color:#0f0; font-family:monospace; padding:20px;">
    <h1>?? AD-MANAGER</h1>
    <input type="text" id="net" placeholder="Network Name (e.g. Monetag)">
    <textarea id="code" style="width:100%; height:200px;" placeholder="Paste Script Here"></textarea>
    <button onclick="sync()">SYNC SCRIPT</button>

    <script>
        async function sync() {
            const res = await fetch('https://talknik-backend.onrender.com/update-ads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ network: document.getElementById('net').value, code: document.getElementById('code').value })
            });
            const d = await res.json();
            alert(d.message);
        }
    </script>
</body>
</html>
