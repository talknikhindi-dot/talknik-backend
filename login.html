<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik Admin Login</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #0f0; padding: 20px; box-shadow: 0 0 15px #0f0; border-radius: 10px; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px 0; width: 100%; display: block; }
        button { background: #0f0; color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        button:hover { background: #0c0; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>TALKNIK ADMIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>

    <script>
        async function login() {
            const res = await fetch('https://talknik-backend.onrender.com/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value })
            });
            const data = await res.json();
            if(data.token) {
                alert('Login Successful! Token Received.');
                localStorage.setItem('adminToken', data.token);
            } else {
                alert('Login Failed: ' + data.message);
            }
        }
    </script>
</body>
</html>
