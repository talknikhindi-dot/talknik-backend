<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { 
            background: #ffffff; width: 100%; max-width: 400px; padding: 30px; border-radius: 24px; 
            text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.08); border: 1px solid #f0f0f0;
        }

        .main-title { font-size: 20px; font-weight: 700; color: #1a73e8; margin-bottom: 20px; text-transform: uppercase; }

        .amount-input { 
            width: 100%; padding: 12px; font-size: 32px; font-weight: 700; border: 2px solid #eee; 
            border-radius: 16px; text-align: center; color: #333; background: #fafafa; outline: none; margin-bottom: 20px;
        }

        /* ॲप निवडण्याचे बटण */
        .app-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { 
            flex: 1; padding: 10px 5px; font-size: 11px; font-weight: 600; border: 1px solid #ddd; 
            border-radius: 10px; cursor: pointer; background: #fff; transition: 0.2s;
        }
        .tab.active { background: #1a73e8; color: white; border-color: #1a73e8; }

        .qr-frame { background: #fff; padding: 10px; border: 1px solid #f0f0f0; border-radius: 20px; display: inline-block; margin-bottom: 20px; }
        .qr-frame img { width: 200px; height: 200px; display: block; }

        .pay-button { 
            background: #1a73e8; color: white; width: 100%; padding: 16px; border-radius: 14px; 
            border: none; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 25px rgba(26, 115, 232, 0.2);
        }

        .bank-label { margin: 25px 0 15px; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; display: flex; align-items: center; }
        .bank-label::after { content: ""; height: 1px; background: #eee; flex: 1; margin-left: 10px; }

        .bank-card { background: #fcfcfc; border: 1px solid #f0f0f0; padding: 12px; border-radius: 12px; text-align: left; margin-bottom: 10px; position: relative; }
        .bank-name { font-size: 12px; font-weight: 700; color: #444; }
        .bank-info { font-size: 10px; color: #777; font-family: monospace; line-height: 1.4; }
        .copy-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 700; color: #1a73e8; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">PAYMENT GATEWAY</h1>

        <input type="number" id="amt-val" class="amount-input" value="99" oninput="updateUI()">

        <div class="app-tabs">
            <div class="tab active" onclick="changeApp('8554065002@axl', this)">Google Pay</div>
            <div class="tab" onclick="changeApp('8554065002@ibl', this)">PhonePe</div>
            <div class="tab" onclick="changeApp('8554065002@ybl', this)">Paytm</div>
        </div>

        <div class="qr-frame">
            <img id="qr-img" src="" alt="QR Code">
        </div>

        <button class="pay-button" onclick="payNow()">PAY NOW</button>

        <div class="bank-label">Bank Transfer</div>

        <div class="bank-card">
            <div class="bank-name">KAIJSB Bank</div>
            <div class="bank-info">ACC: 031001100009003<br>IFSC: KAIJ0000031</div>
            <button class="copy-btn" onclick="copy('031001100009003')">COPY</button>
        </div>

        <div class="bank-card">
            <div class="bank-name">State Bank of India</div>
            <div class="bank-info">ACC: 43197678265<br>IFSC: SBIN0000384</div>
            <button class="copy-btn" onclick="copy('43197678265')">COPY</button>
        </div>

        <div class="bank-card">
            <div class="bank-name">Bank of India</div>
            <div class="bank-info">ACC: 091518210014964<br>IFSC: BKID0000915</div>
            <button class="copy-btn" onclick="copy('091518210014964')">COPY</button>
        </div>
    </div>

    <script>
        let currentUpi = "8554065002@axl";

        function updateUI() {
            let amt = document.getElementById('amt-val').value || 0;
            document.getElementById('qr-img').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=" + currentUpi + "%26pn=Talknik%20IT%26am=" + amt;
        }

        function changeApp(upi, el) {
            currentUpi = upi;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            updateUI();
        }

        function payNow() {
            let amt = document.getElementById('amt-val').value || 0;
            window.location.href = "upi://pay?pa=" + currentUpi + "&pn=Talknik IT&am=" + amt + "&cu=INR";
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }

        updateUI();
    </script>
</body>
</html>
