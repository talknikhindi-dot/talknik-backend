<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik Engine | Signup Test</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #00ffcc; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px #00ffcc; background: #111; }
        h2 { text-shadow: 0 0 10px #00ffcc; }
        input { background: #222; border: 1px solid #00ffcc; color: #fff; padding: 10px; margin: 10px 0; border-radius: 5px; width: 200px; outline: none; }
        button { background: #00ffcc; color: #000; border: none; padding: 10px 25px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #status { margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>TALKNIK SIGNUP</h2>
        <input type="text" id="username" placeholder="Username"> <br>
        <input type="password" id="password" placeholder="Password"> <br>
        <button onclick="handleSignup()">CREATE ACCOUNT</button>
        <div id="status"></div>
    </div>

    <script>
        async function handleSignup() {
            const statusDiv = document.getElementById('status');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(!user || !pass) { statusDiv.innerText = "❌ Please fill all fields"; return; }

            statusDiv.innerText = "⏳ Connecting to Talknik Engine...";

            try {
                const response = await fetch('https://talknik-backend.onrender.com/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (response.ok) {
                    statusDiv.style.color = "#00ff00";
                    statusDiv.innerText = "✅ " + data.message;
                } else {
                    statusDiv.style.color = "#ff3333";
                    statusDiv.innerText = "❌ " + (data.error || "Signup Failed");
                }
            } catch (err) {
                statusDiv.innerText = "❌ Connection Error: Check your Backend Status";
            }
        }
    </script>
</body>
</html>
