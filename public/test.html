<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik Auth - Cyberpunk</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { border: 2px solid #00ff00; padding: 30px; box-shadow: 0 0 20px #00ff00; background: rgba(0, 255, 0, 0.05); border-radius: 10px; width: 300px; }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 3px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #00ff00; color: #00ff00; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00ff00; border: none; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #000; color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        #status { margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 12px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="form-title">Login</h2>
        <input type="text" id="username" placeholder="USERNAME">
        <input type="password" id="password" placeholder="PASSWORD">
        <button id="main-btn" onclick="handleAuth()">ENTER SYSTEM</button>
        <div class="toggle-link" onclick="toggleForm()" id="toggle-text">New User? Create Account</div>
        <div id="status"></div>
    </div>

    <script>
        let isLogin = true;
        const backendURL = "https://talknik-backend.onrender.com/api/auth";

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? "Login" : "Signup";
            document.getElementById('main-btn').innerText = isLogin ? "ENTER SYSTEM" : "CREATE ACCOUNT";
            document.getElementById('toggle-text').innerText = isLogin ? "New User? Create Account" : "Back to Login";
            document.getElementById('status').innerText = "";
        }

        async function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');
            
            if(!user || !pass) { statusDiv.innerText = "❌ Please fill all fields"; return; }
            
            const endpoint = isLogin ? "/login" : "/signup";
            statusDiv.innerText = "⚡ Connecting to Talknik...";

            try {
                const response = await fetch(backendURL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();
                if (response.ok) {
                    statusDiv.style.color = "#00ff00";
                    statusDiv.innerText = "✅ " + data.message;
                    if(isLogin) {
                        setTimeout(() => alert("WELCOME TO TALKNIK ENGINE, " + user), 500);
                    }
                } else {
                    statusDiv.style.color = "#ff3333";
                    statusDiv.innerText = "❌ " + (data.error || "Action Failed");
                }
            } catch (err) {
                statusDiv.innerText = "❌ Backend Offline. Check Render Logs.";
            }
        }
    </script>
</body>
</html>
