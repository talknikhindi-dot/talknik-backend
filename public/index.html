<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik Engine | Secure Login</title>
    <style>
        body { background: #0a0a0a; color: #f1c40f; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box { background: rgba(20, 20, 20, 0.9); padding: 40px; border-radius: 15px; border: 2px solid #f1c40f; box-shadow: 0 0 20px #f1c40f; width: 320px; text-align: center; }
        h2 { text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; text-shadow: 0 0 10px #f1c40f; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #f1c40f; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f1c40f; border: none; color: black; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #d4ac0d; transform: scale(1.05); }
        .link { margin-top: 15px; font-size: 12px; color: #888; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 id="title">User Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleAuth()" id="btn">Enter System</button>
        <div class="link" onclick="toggleMode()" id="toggleText">New User? Create Account</div>
    </div>

    <script>
        let isLogin = true;
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "User Login" : "User Signup";
            document.getElementById('btn').innerText = isLogin ? "Enter System" : "Create Account";
            document.getElementById('toggleText').innerText = isLogin ? "New User? Create Account" : "Back to Login";
        }

        async function handleAuth() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/signup';
            
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            alert(data.message);
        }
    </script>
</body>
</html>
