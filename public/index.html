<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik Portal</title>
    <style>
        body { background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .box { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); width: 340px; text-align: center; border: 1px solid #f0f0f0; }
        h2 { font-weight: 600; margin-bottom: 25px; color: #111; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; background: #fafafa; }
        button { width: 100%; padding: 14px; background: #111; color: #fff; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; margin-top: 15px; font-weight: 600; }
        .tgl { margin-top: 20px; color: #007bff; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="t">Sign In</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button onclick="auth()" id="b">Continue</button>
        <div class="tgl" onclick="toggle()" id="s">New User? Register here</div>
    </div>
    <script>
        let isL = true;
        function toggle() {
            isL = !isL;
            document.getElementById('t').innerText = isL ? "Sign In" : "Register";
            document.getElementById('b').innerText = isL ? "Continue" : "Register Now";
            document.getElementById('s').innerText = isL ? "New User? Register here" : "Back to Login";
        }
        async function auth() {
            const r = await fetch(isL ? '/api/auth/login' : '/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value })
            });
            const d = await r.json();
            alert(d.message);
        }
    </script>
</body>
</html>
