<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talknik Engine | Login</title>
    <style>
        body { background: #050505; color: #f1c40f; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #111; padding: 40px; border: 2px solid #f1c40f; border-radius: 10px; box-shadow: 0 0 15px #f1c40f; width: 350px; text-align: center; }
        h1 { margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; font-size: 22px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: #f1c40f; outline: none; }
        button { width: 100%; padding: 12px; background: #f1c40f; border: none; color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        .toggle { margin-top: 20px; font-size: 13px; color: #888; cursor: pointer; }
        .toggle:hover { color: #f1c40f; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">User Login</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="auth()" id="btn">Enter System</button>
        <p class="toggle" onclick="toggle()" id="tgl">New User? Create Account</p>
    </div>
    <script>
        let isLogin = true;
        function toggle() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "User Login" : "User Signup";
            document.getElementById('btn').innerText = isLogin ? "Enter System" : "Sign Up Now";
            document.getElementById('tgl').innerText = isLogin ? "New User? Create Account" : "Already have account? Login";
        }
        async function auth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch(isLogin ? '/api/auth/login' : '/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            alert(data.message);
        }
    </script>
</body>
</html>
